name: build wheel with ci

on:
  workflow_dispatch:

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2025, macos-latest, macos-15-intel]
      fail-fast: false
    env:
      CIBW_ARCHS_LINUX: "x86_64 aarch64 riscv64"
      CIBW_ARCHS_WINDOWS: "AMD64 x86"
      CIBW_ARCHS_MACOS: "x86_64 universal2 arm64"
      CIBW_ENVIRONMENT: USE-CYTHON="1" USE-CFFI="1"
      CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
      CIBW_ENABLE: "cpython-freethreading"
      CIBW_BUILD_FRONTEND: "build"
      CIBW_TEST_SKIP: "*"

      CIBW_ENVIRONMENT_LINUX: "ENABLE_IO_URING=ON"
      CIBW_BEFORE_ALL_LINUX: "apt install -y liburing-dev"
    steps:
    - uses: actions/checkout@v4
    - name: Check out recursively
      run: git submodule update --init --recursive
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Set up QEMU
      if: runner.os == 'Linux'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: all
    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel==3.2.1
    - name: Build wheels
      run: python -m cibuildwheel --output-dir wheelhouse
    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl