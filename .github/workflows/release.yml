name: Build and Publish to PyPI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind

      - name: Install build dependencies (Win/macOS)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      # Windows/macOS: 直接构建
      - name: Build wheel on Windows/macOS
        if: runner.os != 'Linux'
        run: |
          python -m build --wheel --outdir dist
      
      # Linux: 使用 cibuildwheel + manylinux 镜像构建
      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          CP_VERSION=$(echo "${{ matrix.python-version }}" | tr -d '.')
          pip install cibuildwheel

          export CIBW_BUILD="cp${CP_VERSION}-*"
          export CIBW_ARCHS="x86_64"
          export CIBW_MANYLINUX_X86_64_IMAGE="manylinux_2_28"
          export CIBW_BUILD_FRONTEND="build"
          export CIBW_TEST_SKIP="*"
          
          # manylinux: 启用 io_uring，安装 liburing-devel
          export CIBW_ENVIRONMENT="ENABLE_IO_URING=ON"
          export CIBW_BEFORE_ALL="yum install -y liburing-devel"
          
          # musllinux: 不启用 io_uring（使用默认的线程池后端）
          # Alpine Linux 没有 liburing 包，让 CMake 自动检测并禁用
          export CIBW_MUSLLINUX_X86_64_IMAGE="musllinux_1_2"
          export CIBW_ENVIRONMENT_MUSLLINUX_X86_64="ENABLE_IO_URING=OFF"
          
          python -m cibuildwheel --output-dir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels for Python ${{ matrix.python-version }} on ${{ matrix.os }} ==="
          ls -la dist/
      
      # 上传 wheel 作为 artifact
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
        
      - name: Collect all wheels
        shell: bash
        run: |
          mkdir -p dist
          find wheels -name "*.whl" -type f -exec cp {} dist/ \;
          echo "=== Collected wheels ==="
          ls -la dist/
          
          for wheel in dist/*.whl; do
            if unzip -t "$wheel" > /dev/null 2>&1; then
              echo "✓ $(basename $wheel) is valid"
            else
              echo "✗ $(basename $wheel) is corrupted"
              exit 1
            fi
          done
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          twine upload --skip-existing dist/*.whl --verbose