name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      # Linux: 使用 cibuildwheel 构建
      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          CP_VERSION=$(echo "${{ matrix.python-version }}" | tr -d '.')
          export CIBW_BUILD="cp$CP_VERSION-*"
          export CIBW_ARCHS="x86_64"
          export CIBW_MANYLINUX_X86_64_IMAGE="manylinux2014"
          export CIBW_BUILD_FRONTEND="build"
          export CIBW_TEST_SKIP="*"
          
          pip install cibuildwheel
          python -m cibuildwheel --output-dir dist
      
      # Windows/macOS: 构建 wheel
      - name: Build wheel on Windows/macOS
        if: runner.os != 'Linux'
        run: |
          python -m build --wheel --outdir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels ==="
          ls -la dist/
      
      # ============================================================
      # 关键步骤：安装 wheel 并运行测试
      # ============================================================
      - name: Install wheel and run tests
        shell: bash
        run: |
          # 找到 wheel 文件：优先匹配当前 Python 版本（如 cp312），否则尝试 abi3，再退回任意第一个 wheel
          PYTAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          echo "Python tag: $PYTAG"
          WHEEL=$(ls dist/*${PYTAG}*.whl 2>/dev/null | head -n 1 || true)
          if [ -z "$WHEEL" ]; then
            WHEEL=$(ls dist/*abi3*.whl 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "$WHEEL" ]; then
            WHEEL=$(ls dist/*.whl 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "$WHEEL" ]; then
            echo "No wheel found in dist/"
            exit 1
          fi
          echo "Testing wheel: $WHEEL"

          # 创建虚拟环境
          python -m venv test_env

          # 激活虚拟环境（跨平台）
          if [ "${{ runner.os }}" = "Windows" ]; then
            source test_env/Scripts/activate
          else
            source test_env/bin/activate
          fi

          # 安装 wheel
          pip install "$WHEEL"
          
          # ============================================================
          # DEBUG: 查看安装后的文件结构
          # ============================================================
          echo "=== DEBUG: Python site-packages location ==="
          python -c "import site; print(site.getsitepackages())"
          
          echo "=== DEBUG: ayafileio package contents ==="
          SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Site packages: $SITE_PKG"
          
          if [ -d "$SITE_PKG/ayafileio" ]; then
            echo "Contents of $SITE_PKG/ayafileio:"
            ls -la "$SITE_PKG/ayafileio/"
          else
            echo "ERROR: ayafileio directory not found in site-packages!"
            echo "Searching for ayafileio anywhere in site-packages:"
            find "$SITE_PKG" -name "*ayafileio*" -type d 2>/dev/null || echo "No ayafileio directories found"
            find "$SITE_PKG" -name "*.pyd" -o -name "*.so" 2>/dev/null | head -20 || echo "No extension files found"
          fi
          
          echo "=== DEBUG: All extension files in site-packages ==="
          find "$SITE_PKG" -name "*.pyd" -o -name "*.so" 2>/dev/null | head -20 || echo "No extension files found"
          
          # 尝试直接导入 .pyd 文件
          echo "=== DEBUG: Trying to import _ayafileio directly ==="
          python -c "import sys; print(sys.path)" || true
          python -c "import _ayafileio" 2>&1 || echo "Cannot import _ayafileio"
          
          # ============================================================
          # 正式测试
          # ============================================================
          echo "=== Testing import ==="
          python -c "import ayafileio; print('✓ Import OK')"
          
          echo "=== Running test_base.py ==="
          python test_base.py
          
          echo "=== All tests passed ==="
      
      # 上传 artifacts（只有测试通过才会执行到这里）
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      
      - name: List all collected wheels
        shell: bash
        run: |
          echo "=== Collected wheels ==="
          ls -la dist/
          echo "=== Wheel count ==="
          ls -la dist/*.whl 2>/dev/null | wc -l
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          echo "=== Publishing to PyPI ==="
          twine upload --skip-existing dist/*.whl --verbose