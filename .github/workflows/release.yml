name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels ==="
          ls -la dist/
      
      - name: Verify wheel contents
        shell: bash
        run: |
          for wheel in dist/*.whl; do
            echo "Checking $wheel"
            if command -v unzip &> /dev/null; then
              unzip -l "$wheel" | grep -E "(_ayafileio|\.so|\.pyd)" || echo "WARNING: No extension found!"
            fi
          done

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      
      - name: List all collected wheels
        shell: bash
        run: |
          echo "=== Directory structure ==="
          find dist -type f -name "*.whl"
          echo "=== All wheels ==="
          find dist -name "*.whl" -exec ls -la {} \;
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          echo "=== Publishing to PyPI ==="
          # 使用 find 找到所有 wheel 文件
          find dist -name "*.whl" -exec twine upload --skip-existing {} +