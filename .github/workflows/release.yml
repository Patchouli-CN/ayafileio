name: Build and Publish to PyPI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
      CIBW_SKIP: "*-musllinux_*"
      CIBW_ARCHS_LINUX: "x86_64"
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
      CIBW_BUILD_FRONTEND: "build"
      CIBW_TEST_SKIP: "*"
      CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
      
      CIBW_ENVIRONMENT_LINUX: "ENABLE_IO_URING=ON"
      CIBW_BEFORE_ALL_LINUX: "yum install -y liburing-devel"
      
      CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=13.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist

      - name: List built wheels
        shell: bash
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
        
      - name: Collect all wheels
        shell: bash
        run: |
          mkdir -p dist
          find wheels -name "*.whl" -type f -exec cp {} dist/ \;
          echo "=== Collected wheels ==="
          ls -la dist/
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing dist/*.whl --verbose