name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install cibuildwheel
        run: pip install cibuildwheel
      - name: Build wheels
        run: python build_it.py --platform auto --output dist --skip-install --yes

      - name: Install built wheel and run tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Environment ==="
          python -V
          pip --version
          echo "RUNNER_OS=$RUNNER_OS"

          echo "=== Wheel contents ==="
          ls -la dist || true
          unzip -l dist/*.whl || true

          echo "=== Upgrade build tools ==="
          python -m pip install --upgrade pip setuptools wheel

          echo "=== Installing wheel ==="
          pip install dist/*.whl

          echo "=== Installed package info ==="
          pip show ayafileio || true

          cat > diag.py <<'PY'
          import sys,os,traceback,glob
          print('python', sys.version)
          print('sys.path:')
          print('\n'.join(sys.path))
          try:
              import ayafileio
              print('ayafileio __file__ =', ayafileio.__file__)
              print('package dir listing:')
              print('\n'.join(os.listdir(os.path.dirname(ayafileio.__file__))))
          except Exception:
              traceback.print_exc()
          try:
              import importlib
              importlib.import_module('ayafileio._ayafileio')
              print('Successfully imported ayafileio._ayafileio')
          except Exception:
              import traceback
              print('Failed to import ayafileio._ayafileio:')
              traceback.print_exc()
              try:
                  import ayafileio, glob, os
                  pkgdir = os.path.dirname(ayafileio.__file__)
                  print('pkgdir =', pkgdir)
                  print('candidates:')
                  print('\n'.join(glob.glob(os.path.join(pkgdir,'*'))))
              except Exception:
                  pass
          PY

          python diag.py || true
          rm -f diag.py

          echo "=== Inspect binary dependencies ==="
          for f in $(python - <<'PY'
          import os,glob,ayafileio
          pkgdir=os.path.dirname(ayafileio.__file__)
          print(' '.join(glob.glob(os.path.join(pkgdir,'*.so'))))
          PY
          ); do
            if [ -n "$f" ]; then
              echo "ldd $f"; ldd "$f" || true
            fi
          done

          for f in $(python - <<'PY'
          import os,glob,ayafileio
          pkgdir=os.path.dirname(ayafileio.__file__)
          print(' '.join(glob.glob(os.path.join(pkgdir,'*.so'))))
          PY
          ); do
            if [ -n "$f" ]; then
              echo "otool -L $f"; otool -L "$f" || true
            fi
          done || true

          echo "=== Run test_base.py (capture full traceback) ==="
          python test_base.py || (
            echo "test_base.py failed — showing Python import diagnostics";
            python - <<'PY'
            import traceback,sys
            try:
                import ayafileio
                print('ayafileio imported, __file__:', ayafileio.__file__)
            except Exception:
                traceback.print_exc()
                sys.exit(1)
            PY
            exit 1
          )

      - name: Install built wheel and run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host '=== Environment ==='
          python -V
          pip --version

          Write-Host '=== Wheel contents ==='
          Get-ChildItem -Path dist -File -Force | Format-Table
          python -m zipfile -l (Get-ChildItem dist -Filter *.whl | Select-Object -First 1).FullName

          Write-Host '=== Upgrade build tools ==='
          python -m pip install --upgrade pip setuptools wheel

          Write-Host '=== Installing wheel ==='
          pip install dist\*.whl

          Write-Host '=== Installed package info ==='
          pip show ayafileio -v || Write-Host 'pip show failed'

          $diag = @'
          import sys,os,traceback,glob
          print('python', sys.version)
          print('sys.path:')
          print('\n'.join(sys.path))
          try:
              import ayafileio
              print('ayafileio __file__ =', ayafileio.__file__)
              print('package dir listing:')
              print('\n'.join(os.listdir(os.path.dirname(ayafileio.__file__))))
          except Exception:
              traceback.print_exc()
          try:
              import importlib
              importlib.import_module('ayafileio._ayafileio')
              print('Successfully imported ayafileio._ayafileio')
          except Exception:
              import traceback
              print('Failed to import ayafileio._ayafileio:')
              traceback.print_exc()
              try:
                  import ayafileio, glob, os
                  pkgdir = os.path.dirname(ayafileio.__file__)
                  print('pkgdir =', pkgdir)
                  print('candidates:')
                  print('\n'.join(glob.glob(os.path.join(pkgdir,'*'))))
              except Exception:
                  pass
          '@

          $diag | Out-File -Encoding utf8 diag.py
          python diag.py
          Remove-Item diag.py -Force

          Write-Host '=== Run test_base.py (capture full traceback) ==='
          python test_base.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host 'test_base.py failed — showing Python import diagnostics'
            python -c @'
          import traceback,sys
          try:
              import ayafileio
              print('ayafileio imported, __file__:', ayafileio.__file__)
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          '@
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Organize wheels
        run: |
          mkdir -p all_wheels
          find dist -name "*.whl" -exec mv {} all_wheels/ \;
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing all_wheels/*.whl --verbose