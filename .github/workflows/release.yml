name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      # Linux: 使用 cibuildwheel 构建正确的 manylinux wheel
      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          pip install cibuildwheel
          python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp311-manylinux_x86_64"
          CIBW_ARCHS: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BUILD_FRONTEND: "build"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
      
      # Windows/macOS: 保持原样
      - name: Build wheel on Windows/macOS
        if: runner.os != 'Linux'
        run: |
          python -m build --wheel --outdir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels ==="
          ls -la dist/
      
      - name: Verify wheel contents
        shell: bash
        run: |
          for wheel in dist/*.whl; do
            echo "Checking $wheel"
            if command -v unzip &> /dev/null; then
              unzip -l "$wheel" | grep -E "(_ayafileio|\.so|\.pyd)" || echo "WARNING: No extension found!"
            fi
          done
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      
      - name: List all collected wheels
        shell: bash
        run: |
          echo "=== Collected wheels ==="
          ls -la dist/
          echo "=== Wheel count ==="
          ls -la dist/*.whl 2>/dev/null | wc -l
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          echo "=== Publishing to PyPI ==="
          twine upload --skip-existing dist/*.whl --verbose