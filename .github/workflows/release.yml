name: Build and Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      # Windows/macOS: 直接构建
      - name: Build wheel on Windows/macOS
        if: runner.os != 'Linux'
        run: |
          python -m build --wheel --outdir dist
      
      # Linux: 使用 manylinux 镜像确保兼容性
      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          # 获取 Python 版本号（去掉点，如 310）
          CP_VERSION=$(echo "${{ matrix.python-version }}" | tr -d '.')
          
          # 使用 cibuildwheel 在 manylinux 容器中构建
          pip install cibuildwheel
          
          # 配置 cibuildwheel
          export CIBW_BUILD="cp${CP_VERSION}-*"
          export CIBW_ARCHS="x86_64"
          export CIBW_MANYLINUX_X86_64_IMAGE="manylinux2014"
          export CIBW_BUILD_FRONTEND="build"
          export CIBW_TEST_SKIP="*"
          
          python -m cibuildwheel --output-dir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels for Python ${{ matrix.python-version }} on ${{ matrix.os }} ==="
          ls -la dist/
      
      # 测试当前 wheel
      - name: Test wheel
        shell: bash
        run: |
          # 找到 wheel 文件
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -n 1)
          if [ -z "$WHEEL" ]; then
            echo "No wheel found!"
            exit 1
          fi
          
          echo "Testing wheel: $WHEEL"
          
          # 创建虚拟环境
          python -m venv test_env
          
          # 激活虚拟环境
          if [ "${{ runner.os }}" = "Windows" ]; then
            source test_env/Scripts/activate
          else
            source test_env/bin/activate
          fi
          
          # 安装 wheel
          pip install "$WHEEL"

          mv ayafileio _ayafileio_src

          # 测试导入
          python -c "import ayafileio; print(f'✓ Import successful on Python {__import__(\"sys\").version}')"

          mv _ayafileio_src ayafileio
          
          # 如果有测试文件，运行测试
          if [ -f "test_base.py" ]; then
            python test_base.py
          fi
      
      # 上传 wheel 作为 artifact
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    # 只在推送 tag 时发布
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
        
      - name: Collect all wheels
        shell: bash
        run: |
          # 创建 dist 目录
          mkdir -p dist
          
          # 查找并复制所有 wheel 文件
          echo "=== Searching for wheel files ==="
          find wheels -name "*.whl" -type f
          
          find wheels -name "*.whl" -type f -exec cp {} dist/ \;
          
          echo "=== Collected wheels ==="
          ls -la dist/
          
          echo "=== Wheel count ==="
          ls dist/*.whl 2>/dev/null | wc -l
          
          # 验证 wheel 文件
          echo "=== Verifying wheels ==="
          for wheel in dist/*.whl; do
            echo "Verifying: $(basename $wheel)"
            if unzip -t "$wheel" > /dev/null 2>&1; then
              echo "  ✓ Valid"
            else
              echo "  ✗ Corrupted"
              exit 1
            fi
          done
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          echo "=== Publishing to PyPI ==="
          twine upload --skip-existing dist/*.whl --verbose