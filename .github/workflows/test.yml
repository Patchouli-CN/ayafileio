name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-linux:
    name: "Linux (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y liburing-dev gdb
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles rich
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5
      run: |
        export CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    - name: Configure core dump
      run: |
        ulimit -c unlimited
        echo "ulimit -c unlimited" >> ~/.bashrc
        echo "Core dump settings:"
        cat /proc/sys/kernel/core_pattern
        echo "ulimit -c: $(ulimit -c)"
        sudo sysctl -w kernel.core_pattern=core.%e.%p.%t
        sudo sysctl -w kernel.core_uses_pid=1
        echo 1 | sudo tee /proc/sys/fs/suid_dumpable
    - name: Run tests with core dump collection
      id: run_tests
      timeout-minutes: 3
      continue-on-error: true
      run: |
        ulimit -c unlimited
        set +e
        python test_base.py
        python test_wrap_fd.py
        EXIT_CODE=$?
        set -e
        echo "Test exit code: $EXIT_CODE"
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        if [ $EXIT_CODE -ne 0 ]; then
          echo "Test failed with exit code $EXIT_CODE"
          echo "Looking for core dumps..."
          CORES=$(find . -name "core*" -type f 2>/dev/null | head -5)
          if [ -n "$CORES" ]; then
            echo "Found core dumps:"
            ls -la core* 2>/dev/null || true
            for CORE in $CORES; do
              echo "========================================"
              echo "Analyzing core dump: $CORE"
              echo "========================================"
              file "$CORE"
              if command -v gdb &> /dev/null; then
                echo ""
                echo "--- GDB Backtrace ---"
                PYTHON_EXE=$(which python)
                echo "Python executable: $PYTHON_EXE"
                gdb -batch -ex "thread apply all bt full" "$PYTHON_EXE" "$CORE" 2>&1 | head -200
                echo ""
                echo "--- GDB Info Threads ---"
                gdb -batch -ex "info threads" "$PYTHON_EXE" "$CORE" 2>&1
                echo ""
                echo "--- GDB Info Shared Libraries ---"
                gdb -batch -ex "info sharedlibrary" "$PYTHON_EXE" "$CORE" 2>&1 | head -50
              fi
            done
          else
            echo "No core dumps found"
          fi
          echo ""
          echo "--- dmesg segfault info ---"
          sudo dmesg | grep -i "segfault\|killed" | tail -20 || true
        fi
        exit $EXIT_CODE
    - name: Upload core dumps (if any)
      if: always() && steps.run_tests.outcome != 'success'
      uses: actions/upload-artifact@v4
      with:
        name: core-dumps-py${{ matrix.python-version }}
        path: |
          core.*
          *.core
        if-no-files-found: ignore
        retention-days: 7

  test-windows:
    name: "Windows (Python ${{ matrix.python-version }})"
    runs-on: windows-2022
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Python dependencies
      timeout-minutes: 2
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles rich
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5
      run: |
        $env:CMAKE_ARGS = "-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    - name: Run tests
      timeout-minutes: 3
      continue-on-error: true
      id: run_tests_windows
      run: |
        python test_base.py
        python test_wrap_fd.py
        echo "EXIT_CODE=$LASTEXITCODE" >> $env:GITHUB_ENV
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }
    - name: Collect crash dumps (Windows)
      if: always() && steps.run_tests_windows.outcome != 'success'
      run: |
        echo "Test failed, checking for crash dumps..."
        Get-ChildItem -Path "$env:LOCALAPPDATA\CrashDumps" -Filter "*.dmp" | ForEach-Object {
          echo "Found dump: $($_.FullName)"
        }
        Get-EventLog -LogName Application -Source "Application Error" -Newest 10 | Format-List

  test-macos:
    name: "macOS (Python ${{ matrix.python-version }})"
    runs-on: macos-14
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Python dependencies
      timeout-minutes: 2
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles rich
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5
      run: |
        export CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    - name: Configure core dump (macOS)
      run: |
        ulimit -c unlimited
        sudo sysctl kern.coredump=1
        echo "Core dump enabled"
    - name: Run tests
      timeout-minutes: 3
      continue-on-error: true
      id: run_tests_macos
      run: |
        ulimit -c unlimited
        python test_base.py
        python test_wrap_fd.py
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        if [ $EXIT_CODE -ne 0 ]; then
          echo "Test failed with exit code $EXIT_CODE"
          CORES=$(find /cores -name "core*" -type f -mmin -5 2>/dev/null | head -5)
          if [ -n "$CORES" ]; then
            echo "Found core dumps:"
            ls -la /cores/core* 2>/dev/null || true
            for CORE in $CORES; do
              echo "========================================"
              echo "Analyzing core dump: $CORE"
              echo "========================================"
              PYTHON_EXE=$(which python)
              lldb -c "$CORE" -o "thread backtrace all" -o "quit" 2>&1 | head -200
            done
          fi
        fi
        exit $EXIT_CODE

  benchmark:
    name: "Benchmark (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]
        python-version: ["3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y liburing-dev
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles rich
    - name: Build ayafileio (Release mode)
      env:
        CMAKE_ARGS: "-DCMAKE_BUILD_TYPE=Release -DENABLE_VERBOSE_LOGGING=OFF"
      run: |
        pip install -e . -v
    - name: Check backend info
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    - name: Run speed benchmark
      id: benchmark
      timeout-minutes: 5
      continue-on-error: true
      shell: bash
      run: |
        set +e
        python test_speed.py
        SPEED_EXIT=$?
        python test_loguru.py
        LOGURU_EXIT=$?
        set -e
        
        if [ $SPEED_EXIT -ne 0 ] || [ $LOGURU_EXIT -ne 0 ]; then
          echo "Benchmark failed: test_speed.py=$SPEED_EXIT, test_loguru.py=$LOGURU_EXIT"
          CORES=$(find . /tmp -name "core*" -type f 2>/dev/null | head -5)
          if [ -n "$CORES" ]; then
            echo "=== Found core dumps ==="
            for CORE in $CORES; do
              echo "Core: $CORE"
              file "$CORE"
              if command -v gdb &> /dev/null; then
                PYTHON_EXE=$(which python)
                echo "--- GDB Backtrace ---"
                gdb -batch -ex "thread apply all bt full" "$PYTHON_EXE" "$CORE" 2>&1 | head -300
                echo "--- GDB Info Registers ---"
                gdb -batch -ex "info registers" "$PYTHON_EXE" "$CORE" 2>&1
              fi
            done
          fi
          echo "--- dmesg ---"
          sudo dmesg | grep -i "segfault\|killed\|oom" | tail -30 || true
        fi
        
        exit $SPEED_EXIT || $LOGURU_EXIT
    - name: Upload core dumps from benchmark
      if: always() && steps.benchmark.outcome != 'success'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-core-dumps-${{ matrix.os }}
        path: |
          core.*
          *.core
          /tmp/core.*
        if-no-files-found: ignore
        retention-days: 7
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ matrix.os }}
        path: |
          benchmark_results.json
          benchmark_results_detailed.json
        if-no-files-found: warn
        retention-days: 30